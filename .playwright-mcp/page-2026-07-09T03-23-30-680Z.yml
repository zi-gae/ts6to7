                        - generic [ref=e5410]:
                          - generic [ref=e5411]:
                            - text: I'm still not sold on typescript. I've used it off and on professionally for years and it has always just felt like a maneuver to create a safehaven to C# and java devs scrambling to find roles in the modern landscape. Doing purely functional with it is or at least was an absolute chore and so much extra typing happens for extremely obvious variable values that you could derive from the name of the variable. YES you technically can do functional programming (but as i said its a pain) and YES its optional and you dont have to use it everywhere, but try pulling that maneuver on a technical team "lets use typescript where we each feel like it".
                            - paragraph [ref=e5412]: I am still of the opinion that well organized and named JS is all that anyone needs and typescript only exists for fresh graduates and fleeing OOP devs.
                            - paragraph [ref=e5413]: "edit: also the downvote button HN is not for disagreeing with comments or unpopular opinions."
                          - paragraph [ref=e5415]:
                            - link "reply" [ref=e5418] [cursor=pointer]:
                              - /url: reply?id=48835826&goto=item%3Fid%3D48833715%2348835826
            - row "upvote drschwabe 3 hours ago | | [–] Same here, and if you really need its key features just add JSDoc and Zod to any given vanilla JS codebase. Passing around mixed types is not necessarily an anti-pattern either ie- you can do type-checking at runtime and use them as conditions for branching into different control flow patterns - so I don't see the benefit of universal enforcement; not that most TS codebases do anyway (ironically). I personally don't have a need for TS which introduces an extra build step, extra ritual when defining functions, and no performance benefit over vanilla JS. If I want stricter coding pattern with performance benefits I will use C/C++ for the job instead. reply" [ref=e5419]:
