                        - generic [ref=e1354]:
                          - generic [ref=e1355]:
                            - text: In 2004 we solved the types for JS with ECMAScript 4 (or ActionScript 2.0).
                            - paragraph [ref=e1356]: Unfortunately this was in the middle of browser wars, so no one cared about the standards and all of that work was lost like tears in rain.
                            - paragraph [ref=e1357]: Around that time I attended MS conference where they introduced IntelliSense and it was a forming experience for myself. You could do actual programming basically with <space>, <dot>, arrow keys and <enter>.
                            - paragraph [ref=e1358]: "\"x = \" and there are only two variables in the scope with the same type so IDE will present them to you in a drop down and you can already think about the next line."
                            - paragraph [ref=e1359]: Fast forward to ~2015 when I'm working on Angular project. The whole idea feels like a caricature Chinese whispers of an OOP framework. Each component is divided into three files, all of them have to identify themselves using a magic string, and that string has to be manually entered into each file.
                            - paragraph [ref=e1360]: There are couple of type systems, like the one from Facebook, but no one is using them. And everyone claims that OOP and types are the thing of the past.
                            - paragraph [ref=e1361]: Part of that corelates to a joke I was making back in 2013, soon after Apple killed Flash and everyone started doing JS everywhere. Major companies where posting job offers for senior javascript devs asking for 5-7 years of experience. But someone who was doing JS for 7 years in 2012 has all his career focused around gluing together jquery plugins.
                            - paragraph [ref=e1362]: Anyway, I'm as well glad that we finally did a full circle and finally have some sanity in the industry...
