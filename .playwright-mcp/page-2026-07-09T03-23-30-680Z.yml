                        - generic [ref=e1043]:
                          - generic [ref=e1044]:
                            - text: Python doesn't have variables in the C sense. It has pointers to objects (aka "names"), and the "=" is a pointer assignment operator.
                            - paragraph [ref=e1045]: "So:"
                            - paragraph
                            - code [ref=e1047]: "i = 23 # Create an int(23) object and store its address in i i = \"foo\" # Create a str(\"foo\") object and store its address in i"
                            - text: "i isn't typed. It's a reference to a thing with a type, not a thing with a type itself. It's also pragmatic, in that 99.9% of cases, `1.5 + 2` has a completely obvious meaning. I don't recall ever seeing int+float being the source of a Python bug. Surely someone has, but I haven't."
                            - paragraph [ref=e1048]: "> Python's strong typing mostly boils down to some operator rejecting mixed types."
                            - paragraph [ref=e1049]: Well... yeah. Turns out that plus duck typing is very nearly all most people want out of a type system. I went from Python to Rust and found nearly no difference in how they handle types, except Rust does it at compile time. Judging from the number of people I've seen make the same migration, that seems to be common. And yet no reasonable person makes claims that Rust is weakly typed, even when IMO it's basically Python but enforced at compile time.
