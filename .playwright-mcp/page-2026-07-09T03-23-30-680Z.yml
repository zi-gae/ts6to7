            - 'row "upvote dtech 7 hours ago | | | [–] There''s a lot of nuance to that statement. Most languages, including e.g. Java or Typescript, would not be strongly typed according to your definition, because their type system is \"unsound\": there are known cases where the type system does not protect you and the types are wrong. We generally still call these languages strongly typed. In Typescript this is by design. The most obvious is array variance. Typescript makes them covariant because that''s what a lot of sane TS and JS code uses them as, but they should be invariant because you can write to them. Example: const dogs: Dog[] = [] // A sound type system would error here, // but there''s too many useful cases where you want to do this const animals: Animal[] = dogs animals.push(new Cat()) animals[0].bark() // runtime TypeError here reply" [ref=e647]':
