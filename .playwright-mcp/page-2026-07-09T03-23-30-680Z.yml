            - 'row "upvote jw1224 7 hours ago | | [–] Interesting, I''ve come to the opposite conclusion: a lack of types (or types that are only weakly enforced) costs me significantly more tokens in the long-run to maintain, and makes it far too easy for models to silently introduce bugs. I run all my projects now in TypeScript with the strictest possible settings, including disabling `ts-ignore` markers. (This would drive me absolutely insane, but my agents get over it pretty quickly!) reply" [ref=e5774]':
