            - 'row "upvote Xixi 21 minutes ago | | | [–] There''s been a pendulum swing of sort during my career: static languages like C++/Java, then dynamic ones like Python/Ruby/JavaScript, and now back toward typed languages like TypeScript/Rust/Swift. My read is that people were never really against types: they were against type systems that got in the way. Older ones often weren''t expressive enough, so you ended up writing verbose patterns just to appease the compiler. That''s why dynamic languages gave startups a sizable velocity edge for a while. Modern type systems (with optionals, unions/sum types, inference, etc.) are completely different. To paraphrase a comment I once read here on Hacker News: I''ll take static typing with sum types over dynamic typing, but I''ll take dynamic typing over static typing without sum types... reply" [ref=e1300]':
