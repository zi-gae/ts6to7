        - generic [ref=f12e45]: 내용
        - textbox "내용" [ref=f12e47]:
          - /placeholder: "무엇을 만든 것인지와 다른 분들이 어떻게 사용해 볼 수 있는지 적어주세요.\n왜 만들었는지, 어떤 점이 특징인지 함께 적어주시면 좋습니다.\n\n직접 사용해 볼 수 없는 글이나 소개용 페이지는 Show GN에 올리실 수 없습니다."
          - text: "어제 TypeScript 7이 정식 릴리스됐습니다. Go로 재작성된 네이티브 컴파일러(tsgo)라 약 10배 빨라졌지만, TS6에서 deprecated였던 컴파일러 옵션이 전부 제거됐고 strict 기본값도 true로 바뀌어서 — 오래된 tsconfig를 가진 프로젝트는 업그레이드가 그냥 안 됩니다. 그 기계적인 부분을 자동화하는 codemod를 만들었습니다. npx ts6to7 --dry # 미리보기 (아무것도 안 씌) npx ts6to7 # 적용 하는 일: - tsconfig*.json을 제자리에서 수정 — jsonc-parser로 편집해서 주석과 포맷이 그대로 유지됩니다 - 제거된 옵션을 TS7 등가물로 변환: target: es5 → ES2015, module: umd/amd → ESNext, moduleResolution: node → NodeNext/Bundler, importsNotUsedAsValues → verbatimModuleSyntax 등 - baseUrl은 paths로 폴딩 - typescript 의존성을 ^7.0.0으로 범프 - strict가 미설정이었다면 false로 고정 — 마이그레이션 자체는 동작을 바꾸지 않고, strict 전환은 별도 결정으로 남겨둡니다 - 안전하게 자동 변환할 수 없는 것들(ES5 전용 런타임, ts-node/ts-jest 같은 구 컴파일러 API 기반 도구, types 배열 누락 등)은 파일 단위로 스코프된 \"수동 확인 필요\" 체크리스트로 출력 모노레포도 지원합니다 (모든 패키지 스캔). 아직 초기 버전(0.1.1)이라, tsconfig가 잘못 변환되는 케이스가 있으면 해당 tsconfig를 첨부한 이슈로 알려주시면 큰 도움이 됩니다."
