          - generic [ref=f21e44]:
            - paragraph [ref=f21e45]: 어제 TypeScript 7이 정식 릴리스됐습니다. Go로 재작성된 네이티브 컴파일러(tsgo)라 약 10배 빨라졌지만, TS6에서 deprecated였던 컴파일러 옵션이 전부 제거됐고 strict 기본값도 true로 바뀌어서 — 오래된 tsconfig를 가진 프로젝트는 업그레이드가 그냥 안 됩니다.
            - paragraph [ref=f21e46]: 그 기계적인 부분을 자동화하는 codemod를 만들었습니다.
            - paragraph [ref=f21e47]:
              - text: "npx ts6to7 --dry # 미리보기 (아무것도 안 씌)"
              - text: "npx ts6to7 # 적용"
            - paragraph [ref=f21e48]: "하는 일:"
            - list [ref=f21e49]:
              - listitem [ref=f21e50]: tsconfig*.json을 제자리에서 수정 — jsonc-parser로 편집해서 주석과 포맷이 그대로 유지됩니다
              - listitem [ref=f21e51]: "제거된 옵션을 TS7 등가물로 변환: target: es5 → ES2015, module: umd/amd → ESNext, moduleResolution: node → NodeNext/Bundler, importsNotUsedAsValues → verbatimModuleSyntax 등"
              - listitem [ref=f21e52]: baseUrl은 paths로 폴딩
              - listitem [ref=f21e53]: typescript 의존성을 ^7.0.0으로 범프
              - listitem [ref=f21e54]: strict가 미설정이었다면 false로 고정 — 마이그레이션 자체는 동작을 바꾸지 않고, strict 전환은 별도 결정으로 남겨둡니다
              - listitem [ref=f21e55]: 안전하게 자동 변환할 수 없는 것들(ES5 전용 런타임, ts-node/ts-jest 같은 구 컴파일러 API 기반 도구, types 배열 누락 등)은 파일 단위로 스코프된 "수동 확인 필요" 체크리스트로 출력
            - paragraph [ref=f21e56]: 모노레포도 지원합니다 (모든 패키지 스캔).
            - paragraph [ref=f21e57]: 아직 초기 버전(0.1.1)이라, tsconfig가 잘못 변환되는 케이스가 있으면 해당 tsconfig를 첨부한 이슈로 알려주시면 큰 도움이 됩니다.
